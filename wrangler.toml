name = "discord-id-to-username"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "discord-id-to-username"

[[routes]]
pattern = "id.saka.ac/*"
zone_name = "saka.ac"

# Secrets: run `wrangler secret put DISCORD_BOT_TOKEN`
